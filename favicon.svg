<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="rg" cx="38%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#ff2a2a"/>
      <stop offset="100%" stop-color="#8c0000"/>
    </radialGradient>
    <radialGradient id="rg2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c00000"/>
      <stop offset="100%" stop-color="#7a0000"/>
    </radialGradient>
  </defs>

  <!-- Red squircle background — fills full 100x100, no margin -->
  <rect x="0" y="0" width="100" height="100" rx="22" ry="22" fill="url(#rg)"/>

  <!-- White diagonal swoosh ribbon -->
  <path d="M 2 28 C 28 8, 72 12, 98 38" stroke="white" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- White downward-pointing triangle outline -->
  <path d="M 50 27 L 78 70 L 22 70 Z" stroke="white" stroke-width="6.5" fill="none" stroke-linejoin="round"/>

  <!-- Inner red filled triangle -->
  <path d="M 50 42 L 66 68 L 34 68 Z" fill="url(#rg2)"/>
</svg>
